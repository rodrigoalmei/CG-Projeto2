<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item 3 - Transformações de Intensidade</title>
    <link rel="stylesheet" href="../shared/pixel-inspector.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">
        <header class="hero">
            <h1>Item 3 - Transformações de Intensidade</h1>
            <div class="toolbar">
                <div class="toolbar-row">
                    <label for="upload">Imagem</label>
                    <input type="file" id="upload" accept=".pgm,image/x-portable-graymap">
                </div>
                <div class="toolbar-row">
                    <label for="transformSelect">Transformação</label>
                    <select id="transformSelect">
                        <option value="negative">Negativo</option>
                        <option value="gamma">Gamma</option>
                        <option value="log">Logaritmo</option>
                        <option value="general">Transferência Geral</option>
                        <option value="dynamic">Faixa Dinâmica</option>
                        <option value="linear">Linear</option>
                    </select>
                    <span id="inputs-area"></span>
                    <button id="applyBtn" onclick="applySelectedTransform()">Transformar</button>
                </div>
            </div>
        </header>
        <section class="grid">
            <article class="card">
                <h2>Imagem Original</h2>
                <div class="canvas-frame">
                    <canvas id="original"></canvas>
                    <div class="pixel-marker" id="original-marker"></div>
                </div>
                <div class="pixel-viewer">
                    <div class="pixel-info-line">
                        <span>Lupa: Eixo X/Y</span>
                        <span id="original-center" class="center-label">Centro: [0, 0]</span>
                    </div>
                    <div id="original-loupe" class="pixel-table-shell"></div>
                </div>
            </article>
            <article class="card">
                <h2>Transformada</h2>
                <div class="canvas-frame">
                    <canvas id="result"></canvas>
                    <div class="pixel-marker" id="result-marker"></div>
                </div>
                <div class="pixel-viewer">
                    <div class="pixel-info-line">
                        <span>Lupa: Eixo X/Y</span>
                        <span id="result-center" class="center-label">Centro: [0, 0]</span>
                    </div>
                    <div id="result-loupe" class="pixel-table-shell"></div>
                </div>
            </article>
        </section>
    </main>
    <script src="../shared/pixel-inspector.js"></script>
    <script src="script.js"></script>
</body>

</html>
